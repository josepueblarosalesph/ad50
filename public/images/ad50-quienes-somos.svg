<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" role="img" aria-label="AD+50 conecta experiencia senior con nuevas oportunidades" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF4EC"/>
      <stop offset="0.55" stop-color="#F6F6F4"/>
      <stop offset="1" stop-color="#F1E7DC"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F08A2E"/>
      <stop offset="1" stop-color="#DA6A16"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B3D3F"/>
      <stop offset="1" stop-color="#252729"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#34363820" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="800" height="620" rx="24" fill="url(#bg)"/>

  <!-- halo -->
  <circle cx="620" cy="150" r="240" fill="#F08A2E" opacity="0.07"/>
  <circle cx="150" cy="520" r="200" fill="#F08A2E" opacity="0.05"/>

  <!-- arco firma del logo -->
  <path d="M120 470 Q 300 120 470 300 T 720 210" fill="none" stroke="url(#orange)" stroke-width="26" stroke-linecap="round" opacity="0.9"/>
  <path d="M120 470 Q 300 120 470 300 T 720 210" fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" opacity="0.12"/>

  <!-- red de conexiones -->
  <g stroke="#DA6A16" stroke-width="2.5" opacity="0.5">
    <line x1="250" y1="250" x2="430" y2="180"/>
    <line x1="430" y1="180" x2="560" y2="330"/>
    <line x1="250" y1="250" x2="330" y2="430"/>
    <line x1="330" y1="430" x2="560" y2="330"/>
  </g>
  <g fill="url(#orange)">
    <circle cx="250" cy="250" r="12"/>
    <circle cx="430" cy="180" r="12"/>
    <circle cx="560" cy="330" r="12"/>
    <circle cx="330" cy="430" r="12"/>
  </g>

  <!-- tarjeta perfil senior -->
  <g filter="url(#soft)">
    <rect x="300" y="300" width="300" height="200" rx="22" fill="#FFFFFF"/>
    <circle cx="360" cy="360" r="30" fill="url(#ink)"/>
    <path d="M360 350 a12 12 0 1 1 0.01 0 M336 386 a24 20 0 0 1 48 0 Z" fill="#F6F6F4"/>
    <rect x="410" y="342" width="150" height="14" rx="7" fill="#E3E3E0"/>
    <rect x="410" y="366" width="110" height="12" rx="6" fill="#EFEFEC"/>
    <rect x="330" y="418" width="240" height="12" rx="6" fill="#F3F3F0"/>
    <rect x="330" y="442" width="180" height="12" rx="6" fill="#F3F3F0"/>
    <rect x="330" y="466" width="90" height="18" rx="9" fill="url(#orange)"/>
  </g>

  <!-- badge +50 -->
  <g filter="url(#soft)">
    <rect x="536" y="250" width="132" height="70" rx="18" fill="url(#ink)"/>
    <text x="602" y="297" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#FFFFFF">+50</text>
  </g>

  <!-- check de confianza -->
  <g filter="url(#soft)">
    <circle cx="230" cy="470" r="40" fill="url(#orange)"/>
    <path d="M212 470 l12 13 l22 -26" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
